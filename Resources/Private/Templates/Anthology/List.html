<html
	xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
	data-namespace-typo3-fluid="true"
>
	<div class="ll-anthology">
		<div class="filters">
			<f:render partial="List/Filters" arguments="{filters: filters, configuration: configuration}" />
		</div>

		<div class="records">
			<f:for each="{paginator.paginatedItems}" as="record">
				<f:render partial="List/Record" arguments="{record: record, singleView: settings.singleView, configuration: configuration}" />
			</f:for>

			<f:if condition="!{paginator.paginatedItems}">
				<f:render partial="List/NoRecords" arguments="{configuration: configuration}" />
			</f:if>
		</div>

		<f:if condition="{settings.enablePagination} && {paginator.numberOfPages} > 1">
			<f:render partial="List/Pagination" arguments="{pagination: pagination, currentPage: currentPage, configuration: configuration}" />
		</f:if>
	</div>
</html>
